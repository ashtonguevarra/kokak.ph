kind = "web"
previewPath = "/"
title = "Kokak"
version = "1.0.0"
id = "artifacts/kokak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18748

[services.development]
run = "pnpm --filter @workspace/kokak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kokak", "run", "build" ]
publicDir = "artifacts/kokak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18748"
BASE_PATH = "/"
